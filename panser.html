<html lang="en">
<head>
    <meta charset="UTF-8">

    <script>
        if (sessionStorage.getItem("auth") !== "1") {
            location.href = "haha.html";
        }
    </script>
</head>
<body>
    <a href="index.html" style="font-size: 2.3rem;">메인으로 돌아가기</a>
    <div id="date"></div>
    <h2>오늘의 한문장</h2>
    <textarea rows="1" cols="60" style="font-size: 1.8rem;"></textarea>
    <h2>1. 시필사</h2>
    <textarea rows="30" cols="75" style="font-size: 1.6rem;"></textarea>
    <h2>2. 달콤한 공부</h2>
    <textarea rows="8" cols="75" style="font-size: 1.6rem;"></textarea>
    <h2>3. 아름다운 책읽기</h2>
    <h4>직접 작성!!</h4>
    <h2>4. 글똥누기</h2>
    <h4>직접 작성!!</h4>
    <script>
        const dateDiv = document.getElementById("date")
        const date = new Date();
        const utc = date.getTime() + (date.getTimezoneOffset() * 60000);
        const kst = new Date(utc + (3600000 * 9));
        const year = kst.getFullYear();
        const month = kst.getMonth() + 1;
        const day = kst.getDay();
        dateDiv.innerHTML = `${year}년 ${month}월 ${day}일`;
    </script>
</body>
</html>
