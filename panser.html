<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판서</title>
    <script>
        if (window.localStorage.getItem("auth") !== "1") {
            location.href = "haha.html";
        }
    </script>
</head>
<body>
    <a href="index.html" style="font-size: 2.3rem;">메인으로 돌아가기</a>
    <div id="date" style="font-size: 2.3rem;"></div>
    <h2>오늘의 한문장</h2>
    <textarea rows="1" cols="60" style="font-size: 1.8rem;"></textarea>
    <h2>1. 시필사</h2>
    <textarea rows="10" cols="75" style="font-size: 1.6rem;"></textarea>
    <h2>2. 달콤한 공부</h2>
    <textarea rows="8" cols="75" style="font-size: 1.6rem;"></textarea>
    <h2>3. 아름다운 책읽기</h2>
    <h4>직접 작성!!</h4>
    <h2>4. 글똥누기</h2>
    <h4>직접 작성!!</h4>
    <script>
    const dateDiv = document.getElementById("date");

    // setInterval 안에서 매번 새로운 날짜 객체를 생성해야 시간이 흐릅니다.
    setInterval(() => {
        const date = new Date(); // 1. 여기서 다시 정의해야 시간이 업데이트됨

        const year = date.getFullYear(); // 2. () 추가
        const month = date.getMonth() + 1; // 3. () 추가
        const day = date.getDate(); // 4. getDay는 요일(0-6)이므로 일자(date)로 변경
        const hours = date.getHours();
        const minutes = date.getMinutes();
        const seconds = date.getSeconds();
        const milliseconds = date.getMilliseconds();

        // 0~9일 경우 앞자리에 0을 붙여주는 패딩 처리 (옵션)
        const p = (n) => String(n).padStart(2, "0");

        dateDiv.innerHTML = `${year}-${p(month)}-${p(day)}, ${p(hours)}:${p(minutes)}:${p(seconds)}.${String(milliseconds).padStart(3, "0")}`;
    }, 12); // 12ms 주기는 너무 빨라 CPU 부담이 될 수 있으니 보통 100~1000ms 추천


    </script>
</body>
</html>
