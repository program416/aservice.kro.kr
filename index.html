<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>my뽑기</title>
<style>
  body { font-family: monospace; font-size: 2em; text-align: center; margin-top: 50px; }
</style>
</head>
<body>
<h1>자리는 왼쪽부터 차례대로 1~8 입니다</h1>
<div id="chair"></div>
<script>
  let listes = ['1', '2', '3', '4', '5', '6', '7', '8'];
  const chair = document.getElementById("chair");
  for (let i = 1; i < 9; i++) {
    const li = document.createElement("li");
    const randomIndex = Math.floor(Math.random() * listes.length);
    li.innerText = $`{i}번 학생의 자리는 {listes[randomIndex]}번 입니다.`
    listes.splice(randomIndex,1)
    chair.appendChild(li);
  }
</script>
</body>
</html>
