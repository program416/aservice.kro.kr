<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>my뽑기</title>
<style>
  body { 
    font-family: monospace;
    font-size: 2em;
    text-align: center;
    margin-top: 50px;
  }
  li {
    border: 3px solid black;
    font-family: "Comic Sans MS", Arial;
    padding: 10px 10px 10px 10px;
    margin: 10px 10px 10px 10px;
  }
  button {
    font-size: 8rem;
  }
  span {
    color: red;
    font-weight: 800;
  }
</style>
</head>
<body>
<h1>자리 뽑기</h1>
<h2>참고자료</h2>
<img src="Img1.png" width="800"><br>
<button onclick="ppopgi()">다시 뽑기</button>
<div id="chair"></div>
<script>
  function ppopgi() {
    let listes = ['1', '2', '3', '4', '5', '6', '7', '8'];
    const chair = document.getElementById("chair");
    chair.replaceChildren();
    for (let i = 1; i < 9; i++) {
      const li = document.createElement("li");
      const randomIndex = Math.floor(Math.random() * listes.length);
      li.innerHTML = `${i}번 학생의 자리는 <span>${listes[randomIndex]}번</span> 입니다.`;
      listes.splice(randomIndex, 1);
      chair.appendChild(li);
    }
  }

  ppopgi();
</script>

</body>
</html>
