<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KST 6자리 토큰</title>
<style>
  body { font-family: monospace; font-size: 2em; text-align: center; margin-top: 50px; }
  .token { background: #f0f0f0; padding: 20px; border-radius: 10px; display: inline-block; }
</style>
</head>
<body>

<div class="token" id="tokenDisplay">------</div>

<script>
// 한국 시간 기준 6자리 토큰 생성
function generateKSTToken() {
  const now = new Date();
  // 한국 시간으로 변환 (UTC + 9시간)
  const kst = new Date(now.getTime() + 9*60*60*1000);

  const year = kst.getFullYear();
  const month = kst.getMonth() + 1; // 0~11
  const day = kst.getDate();
  const hour = kst.getHours();
  const minute = kst.getMinutes();

  // 순수 수학 연산, 난수 없음
  let token = (year * 7521 + month * 26648 + day * 33013 + hour * 19927 + minute * 55210) % 1000000;

  return token.toString().padStart(6, '0'); // 6자리 맞춤
}

// 화면에 표시
function updateToken() {
  const token = generateKSTToken();
  document.getElementById('tokenDisplay').innerHTML = token;
}

// 초기 표시
updateToken();

// 1초마다 체크, 분이 바뀌면 갱신 (한국 시간 기준)
let lastMinute = new Date(new Date().getTime() + 9*60*60*1000).getMinutes();
setInterval(() => {
  const currentMinute = new Date(new Date().getTime() + 9*60*60*1000).getMinutes();
  if (currentMinute !== lastMinute) {
    lastMinute = currentMinute;
    updateToken();
  }
}, 1000);
</script>

</body>
</html>
